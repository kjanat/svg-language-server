#:schema https://gist.githubusercontent.com/kjanat/1172d9d2d6dbe7c6d9983aaabef2eea5/raw/cargo-config.bundle.json

# Cargo configuration for the svg-language-server workspace.
# See: https://doc.rust-lang.org/cargo/reference/config.html

[alias]
br  = "build --release"
bw  = "build --workspace"
bwa = "build --workspace --all-targets"
cw  = "check --workspace --all-targets"
dw  = "doc --workspace --no-deps"
dwn = "--config .cargo/nightly.toml doc"
rb  = "run --bin"
rbr = "run --release --bin"
rr  = "run --release"
tw  = "test --workspace"
twa = "test --workspace --all-targets --all-features"

fmt-check = "fmt --check"
lint      = "clippy --workspace --all-targets --all-features -- -D warnings -D clippy::all"

fmt-svg   = "rb svg-format -q --manifest-path=crates/svg-format/Cargo.toml"
fmt-svg-r = "rbr svg-format -q --manifest-path=crates/svg-format/Cargo.toml"
lsp       = "rb svg-language-server -q --manifest-path=crates/svg-language-server/Cargo.toml"

i-fmt = "install --path=crates/svg-format --bin=svg-format --force"
i-lsp = "install --path=crates/svg-language-server --bin=svg-language-server --force"
