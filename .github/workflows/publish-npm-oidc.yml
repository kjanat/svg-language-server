name: publish-npm-oidc
on: { workflow_call: { inputs: { plan: { required: true, type: string } } } }
permissions: { contents: read }
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    env: { PLAN: "${{ inputs.plan }}" }
    steps:
      - name: Fetch npm packages
        uses: actions/download-artifact@v8
        with: { pattern: artifacts-*, path: dist-npm/, merge-multiple: true }
      - uses: actions/setup-node@v6
        with: { node-version: latest, registry-url: https://registry.npmjs.org }
      - name: Publish dist npm installers
        shell: pwsh
        env: { NPM_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: |
          $ErrorActionPreference = "Stop"

          # Ensure we have the latest npm for better OIDC support
          npm i -g npm@latest

          function Publish-Package {
            param([Parameter(Mandatory)][string]$Source)

            if ($env:NPM_TOKEN) {
              $env:NODE_AUTH_TOKEN = $env:NPM_TOKEN
              npm publish --access public $Source
            } else {
              npm publish --provenance --access public $Source
            }
          }

          $plan = $env:PLAN | ConvertFrom-Json

          $packages = @(
            $plan.releases.artifacts |
              Where-Object { $_ -is [string] -and $_.EndsWith("-npm-package.tar.gz") } |
              ForEach-Object { Split-Path -Leaf $_ } |
              Sort-Object -Unique
          )

          if ($packages.Count -eq 0) {
            $msg = "No npm package artifacts found in dist plan"
            "::error::$msg"; Write-Error "$msg"
          }

          foreach ($pkg in $packages) {
            if ($pkg -notmatch '^[A-Za-z0-9._@+-]+-npm-package\.tar\.gz$') {
              $msg = "Unexpected npm artifact filename: $pkg"
              "::error::$msg"; Write-Error "$msg"
            }

            Publish-Package "./dist-npm/$pkg"
          }
