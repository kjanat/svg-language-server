name: Tree-sitter SVG

on:
  pull_request:
    paths:
      - ".github/workflows/tree-sitter-svg.yml"
      - "grammars/tree-sitter-svg/**"
  push:
    branches: [master]
    paths:
      - ".github/workflows/tree-sitter-svg.yml"
      - "grammars/tree-sitter-svg/**"
  workflow_dispatch: {}

permissions: { contents: read }
concurrency:
  group: tree-sitter-svg-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    defaults: { run: { working-directory: grammars/tree-sitter-svg } }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - uses: kjanat/runner@d876a0b9716806d92e07f5d5560b022b6158ecd5 # v0.14.0
        with: { version: v0.13.1 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version-file: grammars/tree-sitter-svg/.node-version }
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: |
          runner install --frozen --keep-going \
            typecheck \
            test:corpus \
            test:fuzz \
            parse:examples \
            test \
            test:bun \
            test:regex
