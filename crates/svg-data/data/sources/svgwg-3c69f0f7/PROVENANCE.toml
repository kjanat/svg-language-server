# Vendored upstream svgwg definitions consumed by the SVG 2 Editor's Draft
# presence/matrix derivation.
#
# These files were extracted verbatim from the w3c/svgwg git history at the
# pinned commit below — the exact revision recorded in
# `crates/svg-data/data/specs/Svg2EditorsDraft/snapshot.json`
# (`pinned_sources[*].pin.commit`). Vendoring them at the snapshot pin makes
# the element/attribute presence and attribute-scope matrix derivation an
# apples-to-apples comparison against the SVG2-ED snapshot, reproducible
# without a live network clone.
#
# Source of truth: the SPEC definitions below are authoritative. Where the
# deterministic extractor faithfully reflects these files but the committed
# hand-curated snapshot disagrees, the spec wins.
#
# The four `master/*.xml` files are the core SVG 2 + module inventories. The
# fifth, `definitions-animations.xml`, is the SVG Animations module inventory
# (specs/animations/master/definitions.xml at the same pin) — it carries the
# five SMIL animation elements (animate, animateMotion, animateTransform, set,
# mpath) that do not live in the core definitions.xml.
#
# The `master/*.html` chapter inputs (purpose = "description derivation") are
# the rendered spec prose pages, vendored at the same pin and layout. They are
# the source for human-readable element descriptions: each element definition
# is anchored by an `<h2 id="XxxElement">` heading (e.g. id="RectElement") and
# followed by descriptive `<p>` prose. The deterministic HTML extractor reads
# these — never the live network — to derive element descriptions.
#
# Do NOT hand-edit the vendored bytes; re-vendor from a new pinned commit if
# the snapshot pin changes.

schema_version = 1
purpose        = "SVG2-ED presence/matrix derivation (element + attribute presence, attribute elements= scope)"

[authority]
kind  = "github-repo"
title = "w3c/svgwg"
url   = "https://github.com/w3c/svgwg"

[pin]
kind  = "git-commit"
value = "3c69f0f79087ec4ac37a7653e25dbe2ebc7f04d1"
date  = "2026-06-15"
note  = "Matches Svg2EditorsDraft/snapshot.json pinned_sources commit."

[checksum]
strategy = "sha256-per-input"
note     = "Hash raw file bytes as extracted from the pinned commit."

# Core SVG 2 + module inventories, mirrored under `master/` to match the
# upstream layout (`master/<file>`).
