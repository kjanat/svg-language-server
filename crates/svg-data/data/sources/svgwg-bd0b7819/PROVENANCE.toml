# Vendored upstream svgwg artifacts consumed by the SVG 2 spec scanner.
#
# These files were extracted verbatim from the w3c/svgwg git history at the
# pinned commit below — the exact revision that
# `crates/svg-data/data/reviewed/spec_removals.json` was generated from
# (see that file's `source_pin.commit`). Vendoring them makes the
# spec_removals derivation reproducible without a live network clone.
#
# Scanner: workers/svg-compat/src/spec_scan.ts (reads `<root>/master/<file>`).
# Do NOT hand-edit the vendored bytes; re-vendor from a new pinned commit
# and regenerate spec_removals.json if the upstream spec changes.

schema_version = 1
purpose        = "spec_removals.json derivation (SVG 2 removed/obsoleted feature signal)"

[authority]
kind  = "github-repo"
title = "w3c/svgwg"
url   = "https://github.com/w3c/svgwg"

[pin]
kind  = "git-commit"
value = "bd0b7819e8ce69d06e08b4710a18d46ac7252787"
date  = "2026-04-03"

[checksum]
strategy = "sha256-per-input"
note     = "Hash raw file bytes as extracted from the pinned commit."

# Files the scanner parses, mirrored under `master/` to match the layout it
# expects (`${svgwgRoot}/master/<file>`).
[[inputs]]
id     = "definitions"
kind   = "xml"
role   = "top-level SVG 2 inventory (elements, attributes, properties)"
path   = "master/definitions.xml"
sha256 = "5a6a962854caf4da61460ae3965ee5e6a4c39e4e6e9f0fdda320c26c946da580"

[[inputs]]
id     = "definitions-filters"
kind   = "xml"
role   = "Filter Effects module inventory"
path   = "master/definitions-filters.xml"
sha256 = "f96968584136839df0770a6f09049f780b066f1a4b0821dd6664dc50992c696c"

[[inputs]]
