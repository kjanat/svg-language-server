#:schema https://raw.githubusercontent.com/kjanat/zed-editor/refs/heads/feature/extension-toml-schema/crates/extension_api/schemas/language-config.schema.json

name                        = "SVG"
grammar                     = "svg"
path_suffixes               = ["svg"]
code_fence_block_name       = "svg"
first_line_pattern          = "(?i)^\\s*(<\\?xml[^>]*>\\s*)?<svg\\b"
autoclose_before            = ">})]"
block_comment               = { start = "<!--", prefix = "  ", end = "-->", tab_size = 1 }
wrap_characters             = { start_prefix = "<", start_suffix = ">", end_prefix = "</", end_suffix = ">" }
word_characters             = ["-", ":"]
completion_query_characters = ["-", ":"]
prettier_parser_name        = "html"
brackets                    = [
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["comment", "string"] },
  { start = "'", end = "'", close = true, newline = false, not_in = ["comment", "string"] },
  { start = "<!--", end = "-->", surround = true, newline = false, close = false },
  { start = "<", end = ">", close = false, newline = true },
  { start = "!--", end = "-->", close = true, newline = false, not_in = ["comment", "string"] },
]
hard_tabs                   = true
tab_size                    = 2
soft_wrap                   = "none"

[jsx_tag_auto_close]
open_tag_node_name            = "start_tag"
close_tag_node_name           = "end_tag"
jsx_element_node_name         = "element"
tag_name_node_name            = "name"
erroneous_close_tag_node_name = "erroneous_end_tag"
