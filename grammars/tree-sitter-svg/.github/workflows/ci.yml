name: CI
on: { push: { branches: [master] }, pull_request: null, workflow_dispatch: null }
concurrency: { group: "ci-${{ github.sha }}", cancel-in-progress: true }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - { uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 } # v6.0.3
      - { uses: kjanat/runner@10f8979f2cce5f8e4e8113d172c001f6aae7429b, with: { version: latest } } # v0.12.0
      - { uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e, with: { node-version-file: .node-version } } # v6.4.0
      - { uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 } # v2.2.0
      - { uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b } # v8.1.0
      - run: >-
          runner install --frozen --keep-going
          typecheck
          test:corpus
          test:fuzz
          parse:examples
          test
          test:bun
          test:regex
