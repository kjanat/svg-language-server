<!-- Icon set using symbol + use — tests hover on symbol, use, and path -->
<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <symbol id="icon-home" viewBox="0 0 24 24">
      <path d="M3 12 l2-2 m0 0 l7-7 7 7 M5 10 v10 a1 1 0 001 1 h3
               m10-11 l2 2 m-2-2 v10 a1 1 0 01-1 1 h-3 m-4 0 v-6 a1 1 0 011-1 h2 a1 1 0 011 1 v6
               m-6 0 h6"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round" />
    </symbol>

    <symbol id="icon-search" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2" />
      <line x1="21" y1="21" x2="16.65" y2="16.65"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" />
    </symbol>

    <symbol id="icon-settings" viewBox="0 0 24 24">
      <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" fill="none" stroke="currentColor" stroke-width="2" />
      <path d="M19.4 15 a1.65 1.65 0 00.33 1.82 l.06.06 a2 2 0 010 2.83 2 2 0 01-2.83 0 l-.06-.06
               a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51 V21 a2 2 0 01-4 0 v-.09
               A1.65 1.65 0 009 19.4 a1.65 1.65 0 00-1.82.33 l-.06.06 a2 2 0 01-2.83-2.83 l.06-.06
               A1.65 1.65 0 004.68 15 a1.65 1.65 0 00-1.51-1 H3 a2 2 0 010-4 h.09 A1.65 1.65 0 004.6 9
               a1.65 1.65 0 00-.33-1.82 l-.06-.06 a2 2 0 012.83-2.83 l.06.06 A1.65 1.65 0 009 4.68
               a1.65 1.65 0 001-1.51 V3 a2 2 0 014 0 v.09 a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33
               l.06-.06 a2 2 0 012.83 2.83 l-.06.06 A1.65 1.65 0 0019.4 9 a1.65 1.65 0 001.51 1 H21
               a2 2 0 010 4 h-.09 a1.65 1.65 0 00-1.51 1 z"
            fill="none"
            stroke="currentColor"
            stroke-width="2" />
    </symbol>

    <symbol id="icon-bell" viewBox="0 0 24 24">
      <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round" />
    </symbol>
  </defs>

  <!-- Render icons using <use> — hover to see "use" element docs -->
  <use x="20" y="30" width="48" height="48" href="#icon-home" fill="none" stroke="#264653" />
  <use x="100" y="30" width="48" height="48" href="#icon-search" fill="none" stroke="#2a9d8f" />
  <use x="180" y="30" width="48" height="48" href="#icon-settings" fill="none" stroke="#e9c46a" />
  <use x="260" y="30" width="48" height="48" href="#icon-bell" fill="none" stroke="#e76f51" />

  <!-- Labels -->
  <text x="44" y="100" fill="#666" font-family="system-ui" font-size="11" text-anchor="middle">
    Home
  </text>
  <text x="124" y="100" fill="#666" font-family="system-ui" font-size="11" text-anchor="middle">
    Search
  </text>
  <text x="204" y="100" fill="#666" font-family="system-ui" font-size="11" text-anchor="middle">
    Settings
  </text>
  <text x="284" y="100" fill="#666" font-family="system-ui" font-size="11" text-anchor="middle">
    Alerts
  </text>
</svg>
